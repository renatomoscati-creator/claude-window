name: CI
on: [push, pull_request]
jobs:
  test:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Run tests
        run: |
          set -o pipefail
          xcodebuild test \
            -scheme ClaudeWindow \
            -destination 'platform=macOS,arch=arm64' \
            2>&1 | tee /tmp/xcodebuild.log
          tail -30 /tmp/xcodebuild.log
